<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>FL Sign Ops · Locked</title>
<style>
  :root {
    --navy: #0a1f3d;
    --gold: #c9a961;
    --paper: #faf6ec;
    --ink: #15151a;
    --rule: #d4cdb8;
    --red: #a02828;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Aptos','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
    background: linear-gradient(180deg, var(--navy) 0%, #15315a 100%);
    color: var(--paper);
    display: grid;
    place-items: center;
    min-height: 100vh;
  }
  .gate {
    width: 100%;
    max-width: 380px;
    padding: 32px 28px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,169,97,0.4);
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    text-align: center;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: -0.005em;
  }
  .sub {
    margin: 0 0 22px;
    color: rgba(255,255,255,0.65);
    font-size: 13px;
  }
  .row { display: flex; gap: 8px; margin-top: 4px; }
  input[type=password] {
    flex-grow: 1;
    padding: 12px 14px;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    font-family: inherit;
    font-size: 16px;
    background: white;
    color: var(--ink);
    text-align: center;
    letter-spacing: 0.2em;
  }
  input[type=password]:focus { outline: 2px solid var(--gold); border-color: var(--gold); }
  button {
    padding: 12px 22px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #b08d3f; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .err {
    color: #ff8585;
    font-size: 12px;
    margin-top: 12px;
    min-height: 14px;
  }
  .hint {
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    margin-top: 18px;
  }
  .spin {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <main class="gate" role="main">
    <h1>FL Sign Ops · Field Console</h1>
    <p class="sub">Restricted access · Enter passcode</p>
    <form id="f" autocomplete="off">
      <div class="row">
        <input id="p" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autofocus aria-label="Passcode">
        <button id="b" type="submit">Unlock</button>
      </div>
      <div id="err" class="err" role="alert"></div>
    </form>
    <div class="hint">Session-cached after first unlock.</div>
  </main>

  const SS_KEY = 'flsignops_pwd_v1';

  function b64ToBuf(s) {
    const bin = atob(s);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf;
  }

  async function deriveKey(pwd, salt, iter) {
    const baseKey = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: iter, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );
  }

  async function tryUnlock(pwd) {
    const salt = b64ToBuf(BLOB.salt);
    const iv = b64ToBuf(BLOB.iv);
    const ct = b64ToBuf(BLOB.ct);
    const key = await deriveKey(pwd, salt, BLOB.iter);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return new TextDecoder().decode(plain);
  }

  function renderHTML(html) {
    // Replace the entire document with the decrypted HTML.
    // document.open/close + document.write executes embedded <script>s.
    document.open();
    document.write(html);
    document.close();
  }

  async function attempt(pwd, fromCache) {
    const errEl = document.getElementById('err');
    const btn = document.getElementById('b');
    if (errEl) errEl.textContent = '';
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Unlocking…'; }
    try {
      const html = await tryUnlock(pwd);
      try { sessionStorage.setItem(SS_KEY, pwd); } catch (_) {}
      renderHTML(html);
    } catch (err) {
      if (fromCache) {
        try { sessionStorage.removeItem(SS_KEY); } catch (_) {}
        // bad cached pwd, just show form
      } else if (errEl) {
        errEl.textContent = 'Wrong passcode. Try again.';
      }
      if (btn) { btn.disabled = false; btn.textContent = 'Unlock'; }
      const inp = document.getElementById('p');
      if (inp) { inp.value = ''; inp.focus(); }
    }
  }

  // Wire up form
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('f');
    if (form) form.addEventListener('submit', e => {
      e.preventDefault();
      const pwd = document.getElementById('p').value;
      if (pwd) attempt(pwd, false);
    });
    // Auto-unlock if a valid password is in sessionStorage (happens for iframe maps)
    let cached = null;
    try { cached = sessionStorage.getItem(SS_KEY); } catch (_) {}
    if (cached) attempt(cached, true);
  });
})();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>FL Sign Ops · Locked</title>
<style>
  :root {
    --navy: #0a1f3d;
    --navy-2: #15315a;
    --gold: #c9a961;
    --paper: #faf6ec;
    --ink: #15151a;
    --rule: #d4cdb8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Aptos','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
    background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    color: var(--paper);
    display: grid;
    place-items: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .gate {
    width: 100%;
    max-width: 380px;
    padding: 36px 28px;
    text-align: center;
  }
  /* The 6-digit pin row */
  .pin {
    display: flex;
    gap: 10px;
    justify-content: center;
    direction: ltr;
  }
  .pin input {
    width: 44px;
    height: 56px;
    padding: 0;
    text-align: center;
    font-family: 'Aptos','Segoe UI',monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--paper);
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(201,169,97,0.25);
    border-radius: 10px;
    caret-color: var(--gold);
    transition: border-color 0.15s, background 0.15s;
  }
  .pin input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(255,255,255,0.08);
  }
  .pin input.filled {
    border-color: rgba(201,169,97,0.5);
    background: rgba(201,169,97,0.08);
  }
  /* Wrong-state shake + red border */
  .pin.wrong input { border-color: rgba(255,133,133,0.7); }
  .pin.wrong {
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  .err {
    min-height: 18px;
    margin-top: 16px;
    color: #ff8585;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .err.show { opacity: 1; }
  .spin-wrap {
    margin-top: 14px;
    min-height: 18px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .spin-wrap.show { opacity: 1; }
  .spin {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: -2px;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 380px) {
    .pin { gap: 6px; }
    .pin input { width: 38px; height: 50px; font-size: 22px; }
  }
</style>
</head>

        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" aria-label="Digit 2" data-i="1">
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" aria-label="Digit 3" data-i="2">
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" aria-label="Digit 4" data-i="3">
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" aria-label="Digit 5" data-i="4">
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" aria-label="Digit 6" data-i="5">
      </div>
      <div id="err" class="err" role="alert"></div>
      <div id="status" class="spin-wrap"><span class="spin"></span> Unlocking</div>
    </form>

  const SS_KEY = 'flsignops_pwd_v1';
  const PIN_LEN = 6;

  function b64ToBuf(s) {
    const bin = atob(s);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf;
  }
  async function deriveKey(pwd, salt, iter) {
    const baseKey = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: iter, hash: 'SHA-256' },
      baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  }
  async function tryUnlock(pwd) {
    const salt = b64ToBuf(BLOB.salt);
    const iv   = b64ToBuf(BLOB.iv);
    const ct   = b64ToBuf(BLOB.ct);
    const key = await deriveKey(pwd, salt, BLOB.iter);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return new TextDecoder().decode(plain);
  }
  function renderHTML(html) {
    document.open(); document.write(html); document.close();
  }

  const boxes = Array.from(document.querySelectorAll('#pin input'));
  const pinRow = document.getElementById('pin');
  const errEl = document.getElementById('err');
  const statusEl = document.getElementById('status');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
    pinRow.classList.add('wrong');
    statusEl.classList.remove('show');
    setTimeout(() => pinRow.classList.remove('wrong'), 450);
  }
  function clearError() {
    errEl.classList.remove('show');
    pinRow.classList.remove('wrong');
  }
  function resetBoxes(focusFirst) {
    boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); b.disabled = false; });
    if (focusFirst !== false) boxes[0].focus();
  }
  function currentPin() {
    return boxes.map(b => b.value).join('');
  }
  function disableAll() {
    boxes.forEach(b => b.disabled = true);
  }

  async function attempt(pwd, fromCache) {
    clearError();
    disableAll();
    statusEl.classList.add('show');
    try {
      const html = await tryUnlock(pwd);
      try { sessionStorage.setItem(SS_KEY, pwd); } catch (_) {}
      renderHTML(html);
    } catch (err) {
      statusEl.classList.remove('show');
      if (fromCache) {
        try { sessionStorage.removeItem(SS_KEY); } catch (_) {}
        resetBoxes(true);
      } else {
        showError('Wrong passcode');
        resetBoxes(true);
      }
    }
  }

  // Wire each box: autofocus advance, backspace retreat, paste support
  boxes.forEach((box, i) => {
    box.addEventListener('input', e => {
      // Allow only digits — strip everything else
      const v = (e.target.value || '').replace(/\D/g, '');
      e.target.value = v.slice(0, 1);
      if (e.target.value) {
        e.target.classList.add('filled');
        clearError();
        if (i < PIN_LEN - 1) boxes[i + 1].focus();
        else if (currentPin().length === PIN_LEN) attempt(currentPin(), false);
      } else {
        e.target.classList.remove('filled');
      }
    });
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        e.preventDefault();
        boxes[i - 1].focus();
        boxes[i - 1].value = '';
        boxes[i - 1].classList.remove('filled');
      } else if (e.key === 'ArrowLeft' && i > 0) {
        e.preventDefault();
        boxes[i - 1].focus();
      } else if (e.key === 'ArrowRight' && i < PIN_LEN - 1) {
        e.preventDefault();
        boxes[i + 1].focus();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (currentPin().length === PIN_LEN) attempt(currentPin(), false);
      }
    });
    box.addEventListener('paste', e => {
      e.preventDefault();
      const txt = (e.clipboardData || window.clipboardData).getData('text') || '';
      const digits = txt.replace(/\D/g, '').slice(0, PIN_LEN);
      if (!digits) return;
      digits.split('').forEach((d, idx) => {
        if (boxes[idx]) {
          boxes[idx].value = d;
          boxes[idx].classList.add('filled');
        }
      });
      const lastIdx = Math.min(digits.length, PIN_LEN) - 1;
      if (digits.length >= PIN_LEN) attempt(currentPin(), false);
      else boxes[lastIdx + 1].focus();
    });
    box.addEventListener('focus', e => e.target.select());
  });

  // Boot: try cached passcode silently (for iframe maps), else focus first box
  let cached = null;
  try { cached = sessionStorage.getItem(SS_KEY); } catch (_) {}
  if (cached && cached.length === PIN_LEN && /^\d+$/.test(cached)) {
    attempt(cached, true);
  } else {
    boxes[0].focus();
  }
})();
